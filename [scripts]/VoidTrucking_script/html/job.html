<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="xp-wrapper" class="hidden">
        <div id="xp-left" class="xp-circle"></div>
        <div id="xp-bar">
            <div id="xp-fill"></div>
        </div>
        <div id="xp-right" class="xp-circle"></div>
        <div id="xp-text"></div>
    </div>

    <div id="xp-shockwave" class="hidden"></div>
    <div id="xp-burst" class="hidden"></div>

    <div id="job-menu" class="panel hidden">
        <div class="panel-title">Trucking Job</div>
        <div class="panel-content">
            <div class="btn" id="job-start">Start Job</div>
            <div class="btn cancel" id="job-close">Close</div>
        </div>
    </div>

    <div id="job-type-menu" class="panel hidden">
        <div class="panel-title">Choose Job Type</div>
        <div class="panel-content">
            <div class="btn" id="job-legal">Legal Trucking</div>
            <div class="btn" id="job-illegal">Illegal Trucking</div>
            <div class="btn cancel" id="job-type-close">Back</div>
        </div>
    </div>

    <div id="dealer-wrapper" class="panel hidden">
        <div class="panel-title">Truck Dealership</div>
        <div id="dealer-body">
            <div id="dealer-list"></div>

            <div id="dealer-detail">
                <div id="dealer-image"></div>

                <div id="dealer-info">
                    <div id="dealer-name"></div>
                    <div id="dealer-level"></div>
                    <div id="dealer-price"></div>
                    <div id="dealer-rent"></div>
                </div>

                <div id="dealer-buttons">
                    <div class="btn" id="btn-buy">Buy</div>
                    <div class="btn" id="btn-rent">Rent</div>
                    <div class="btn" id="btn-spawn">Spawn</div>
                    <div class="btn cancel" id="btn-close">Close</div>
                    </div>
                </div>
            </div>
        </div>
            <div id="damage-wrapper" class="hidden">
                <div id="merged-health-container">
                     <div id="merged-health-title">Truck / Trailer Health</div>
                     <div id="merged-health-bar-bg">
                        <div id="merged-health-bar"></div>
                </div>
                <div id="merged-health-percent">100%</div>
                </div>
            </div>
